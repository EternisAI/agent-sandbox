# Deploy (Dubai) — roll the agent-sandbox-dubai OVERLAY image onto the `dubai`
# branch env on the freysa-staging-use1 EKS cluster. The Dubai env runs the
# base sandbox + the Dubai/UAE-only skills (skills-dubai/), published as
# agent-sandbox-dubai by build-dubai.yml — the generic agent-sandbox image no
# longer carries those skills, so Dubai MUST ride this overlay, not the generic
# fan-out in deploy-staging.yml (which is why `dubai` was removed from that
# workflow's ENVIRONMENTS).
#
# This repo only PUBLISHES images (build*.yml / release.yml); the cluster runs
# what the gitops-apps deploy pipeline pins. This workflow is the bridge: it
# resolves the freshly built -dubai image (immutable sha- tag + GHCR digest) and
# DISPATCHES gitops-apps/.github/workflows/axion.yaml with environment=dubai
# component=sandbox-dubai — exactly how the generic image reaches staging, only
# the component (and thus the values.yaml `repository:` anchor) differs.
# axion.yaml's `update` job then bumps the sandbox-dubai tag:/digest: in the
# dubai env's values.yaml, commits, packages the tenant OCI artifact, and
# reconciles Flux. We do NOT commit to gitops-apps from here: GITOPS_APPS_PAT is
# a workflow-dispatch-only PAT (Actions:write, no Contents:write), shared with
# the axionhypothesis image workflows.
#
# This is the branch-env sibling of deploy-staging.yml. Two differences:
#   - deploys the -dubai OVERLAY image (deploy-staging.yml deploys the generic
#     image, deploy-thailand.yml the -thailand overlay into gitops-siam-ai); and
#   - tracks build-dubai.yml's continuous main build (workflow_run on "Build and
#     Push (Dubai)"), so each green main build of the Dubai overlay rolls onto
#     the dubai env.
#
# Two entry points:
#   - workflow_run : after "Build and Push (Dubai)" published a main image,
#                    deploy that exact commit. The trigger is filtered to
#                    branches: [main] (this env tracks main only), so the
#                    immutable sha-<short> tag is derived straight from the built
#                    commit (workflow_run.head_sha) and the digest resolved from
#                    GHCR (the source of truth) — no artifact is read.
#   - workflow_dispatch : deploy a chosen tag. Leave `image_tag` empty to deploy
#                    the branch's image (main / a feature branch), or set it to
#                    an exact immutable tag (sha-<commit>, or an X.Y.Z release) —
#                    handy for a rollback.
#
# What gets pinned: always an IMMUTABLE reference. On workflow_run it's the
# sha-<short> of the built commit (workflow_run.head_sha); an explicit dispatch
# input is passed as-is (and validated immutable); an empty-input dispatch
# resolves the branch's moving tag (latest / <slug>) and de-references it to the
# sha-<short> tag at the same digest — a mutable `latest` in a K8s manifest is a
# smell. The digest is always resolved from the registry and the run FAILS if no
# such image exists, so we never dispatch a pin for a tag that isn't published.
name: Deploy (Dubai)

on:
  workflow_run:
    workflows: ["Build and Push (Dubai)"]
    types: [completed]
    # The dubai env tracks main only — filter at the trigger so a feature-branch
    # build-dubai.yml dispatch never starts a dubai deploy (fail-safe; no in-job
    # branch/environment guard needed).
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Dubai image tag to deploy — empty = this branch's image (pinned to its immutable sha- tag); or an exact immutable tag (sha-<commit> or X.Y.Z)"
        required: false
        default: ""

# Serialize deploys so a manual dispatch and an auto (workflow_run) deploy don't
# fire conflicting pins; never cancel one mid-dispatch.
concurrency:
  group: deploy-dubai
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # Single-env fan-out: the -dubai overlay image feeds only the `dubai` branch
  # env. Kept as a list for parity with deploy-staging.yml — one axion.yaml
  # dispatch per entry. The env must have a matching `- environment: dubai` on
  # the axion ResourceSet in the central gitops repo (else there is no Flux
  # Kustomization to reconcile).
  ENVIRONMENTS: "dubai"

jobs:
  deploy:
    # workflow_run fires on success AND failure — only deploy a successful
    # build. dispatch always proceeds.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read   # oras uses GITHUB_TOKEN; the dispatch uses GITOPS_APPS_PAT
      packages: read    # oras reads the image manifest from GHCR

    steps:
      - name: Set up ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      # oras reads ~/.docker/config.json, which docker/login-action writes — so
      # the manifest fetch below is authenticated against GHCR with no extra login.
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target image
        id: resolve
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.image_tag }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          # GHCR path is lowercase; the Dubai image is the repo image + -dubai
          # (deploy-staging.yml uses the repo as-is; deploy-thailand.yml appends
          # -thailand). This is also the `repository:` value the dubai
          # values.yaml carries, so component=sandbox-dubai anchors on it.
          image="${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')-dubai"
          slugify() { echo "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#^[._-]+##; s#[._-]+$##' | cut -c1-128; }
          digest_of() { oras manifest fetch --descriptor "$1" 2>/dev/null | jq -r '.digest // empty' 2>/dev/null || true; }

          # Determine the requested tag. `moving` flags a mutable tag (latest or
          # branch slug) that must be de-referenced to an immutable sha- tag
          # before it's pinned — a `latest` in a K8s manifest is a smell.
          moving=false
          case "${EVENT}" in
            workflow_run)
              # The trigger is filtered to branches: [main], so this is always a
              # main commit. Derive the immutable tag straight from the built
              # commit — build-dubai.yml tags sha-<short> off the same SHA —
              # rather than trusting any deploy-info artifact.
              tag="sha-${HEAD_SHA::7}"
              ;;
            workflow_dispatch)
              if [ -n "${INPUT_TAG}" ]; then
                # Explicit input is passed as-is, so it must already be immutable:
                # a sha-<commit> build tag or an X.Y.Z release tag. Reject a
                # mutable tag (latest, a branch slug) — to deploy a branch's
                # image leave image_tag empty (de-referenced to its sha- below).
                if [[ ! "${INPUT_TAG}" =~ ^(sha-[0-9a-f]{7,40}|[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
                  echo "::error::image_tag '${INPUT_TAG}' is not immutable (expected sha-<commit> or X.Y.Z). Leave image_tag empty to deploy a branch's image, pinned to its sha- tag."
                  exit 1
                fi
                tag="${INPUT_TAG}"
              elif [ "${REF_NAME}" = "main" ]; then
                tag="latest"; moving=true
              else
                tag="$(slugify "${REF_NAME}")"; moving=true
              fi
              ;;
          esac
          if [ -z "${tag:-}" ] || [ "${tag}" = "null" ]; then
            echo "::error::Could not determine an image tag to deploy."
            exit 1
          fi

          # Registry is the source of truth: resolve tag -> digest, fail if absent.
          digest="$(digest_of "${image}:${tag}")"
          if [ -z "${digest}" ]; then
            echo "::error::No image found at ${image}:${tag} — nothing to deploy."
            exit 1
          fi

          # De-reference a moving tag to the immutable sha- tag at the same
          # digest. The build always pushes sha-<short> alongside the moving tag,
          # so a match is expected to exist.
          if [ "${moving}" = "true" ]; then
            pin_tag=""
            # Fast path: the dispatched commit is usually the build commit.
            if [ "$(digest_of "${image}:sha-${GITHUB_SHA::7}")" = "${digest}" ]; then
              pin_tag="sha-${GITHUB_SHA::7}"
            else
              # Fallback (e.g. HEAD built no image, so latest points further
              # back): scan sha- tags for the one with the matching digest.
              for t in $(oras repo tags "${image}" || true); do
                case "${t}" in
                  sha-*) if [ "$(digest_of "${image}:${t}")" = "${digest}" ]; then pin_tag="${t}"; break; fi ;;
                esac
              done
            fi
            if [ -z "${pin_tag}" ]; then
              echo "::error::No immutable sha- tag points at ${image}@${digest} (moving tag '${tag}'); refusing to pin a mutable tag."
              exit 1
            fi
            echo "De-referenced moving tag '${tag}' -> '${pin_tag}'"
            tag="${pin_tag}"
          fi

          echo "Will dispatch sandbox-dubai pin ${image}:${tag} -> ${digest}"
          {
            echo "tag=${tag}"
            echo "digest=${digest}"
          } >> "$GITHUB_OUTPUT"

      # Dispatch the gitops-apps deploy pipeline for the sandbox-dubai component,
      # once per target environment. axion.yaml's `update` job pins the
      # tag/digest in THAT env's values.yaml, commits, packages the tenant OCI
      # artifact, and reconciles Flux. Same call the axionhypothesis image
      # workflows make for server/worker/etc. Context values go through env
      # (GitHub's script-injection hardening), not inline.
      #
      # FIRE-AND-FORGET: `gh workflow run` only enqueues the dispatch — it does
      # not return the triggered run's id, and this step does NOT watch it. So a
      # green step means every environment's dispatch was ACCEPTED, not that
      # axion.yaml (pin → OCI push → Flux reconcile) actually succeeded. Watch
      # the real deploy outcome in gitops-apps' axion.yaml runs.
      - name: Dispatch gitops-apps deploy (sandbox-dubai)
        env:
          GH_TOKEN: ${{ secrets.GITOPS_APPS_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
          REF_NAME: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          TAG: ${{ steps.resolve.outputs.tag }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
        run: |
          set -euo pipefail
          # One dispatch per env in ENVIRONMENTS. Don't abort the loop on a single
          # env's dispatch failure (`if !` shields it from `set -e`) — attempt
          # them all, then fail the job if any failed. axion.yaml serializes +
          # reconciles each env independently (per-env values.yaml + an
          # `axion-artifact-<env>` concurrency group), so the dispatches don't
          # collide even when they land together.
          rc=0
          for environment in ${ENVIRONMENTS}; do
            echo "Dispatching axion.yaml environment=${environment} component=sandbox-dubai (${TAG}@${DIGEST})…"
            if ! gh workflow run axion.yaml \
              --repo "${REPO_OWNER}/gitops-apps" --ref main \
              --field environment="${environment}" \
              --field component=sandbox-dubai \
              --field actor="${ACTOR}" \
              --field actor_id="${ACTOR_ID}" \
              --field ref_type=branch \
              --field ref_name="${REF_NAME}" \
              --field tag="${TAG}" \
              --field digest="${DIGEST}"; then
              echo "::error::Failed to dispatch axion.yaml for environment=${environment}"
              rc=1
            fi
          done
          exit "${rc}"
